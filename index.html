const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── UTILS ──────────────────────────────────────────────────────────────── */
const genId = () => Math.random().toString(36).substr(2, 9);
const pad   = n => String(n).padStart(2,'0');

const fmt = (amt, cur='€') =>
  `${cur}${Math.abs(amt).toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2})}`;

const fmtDate = s => {
  if (!s) return '';
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'});
};

const dStr = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const today = new Date();
const todayStr = dStr(today.getFullYear(), today.getMonth(), today.getDate());

const toMonthly = src => {
  if (src.frequency==='monthly')     return src.amount;
  if (src.frequency==='weekly')      return src.amount * 4.33;
  if (src.frequency==='fortnightly') return src.amount * 2.17;
  if (src.frequency==='yearly')      return src.amount / 12;
  return src.amount;
};
const billMonthly = b => {
  if (b.recurring==='monthly')     return b.amount;
  if (b.recurring==='weekly')      return b.amount * 4.33;
  if (b.recurring==='fortnightly') return b.amount * 2.17;
  return b.amount;
};

/* ── LOCAL STORAGE HOOK ─────────────────────────────────────────────────── */
function useLS(key, def) {
  const [val, set] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key,val]);
  return [val, set];
}

/* ── SHARED UI ──────────────────────────────────────────────────────────── */
const Modal = ({open, close, title, children}) => {
  useEffect(() => {
    if (open) {
      document.body.style.overflow = 'hidden';
      document.body.classList.add('modal-open');
    } else {
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
    }
    return () => {
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
    };
  }, [open]);
  if (!open) return null;
  return ReactDOM.createPortal(
    <>
      <div
        style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:9998,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)'}}
        className="fade-in"
        onClick={close}
      />
      <div
        style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:9999,overflowY:'auto'}}
        onClick={close}
      >
        <div style={{display:'flex',flexDirection:'column',minHeight:'100%',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
          <div
            style={{width:'100%',maxWidth:'32rem',borderRadius:'1.5rem',position:'relative',flexShrink:0}}
            className="bg-white dark:bg-forest-800 shadow-2xl scale-in"
            onClick={e=>e.stopPropagation()}
          >
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-forest-700">
              <h2 className="font-display text-xl text-gray-800 dark:text-gray-100">{title}</h2>
              <button onClick={close} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-forest-700 transition-colors" aria-label="Close">
                <I n="x" s={18} c="text-gray-500 dark:text-gray-400"/>
              </button>
            </div>
            <div className="p-5 pb-8">{children}</div>
          </div>
        </div>
      </div>
    </>,
    document.body
  );
};

/* ── BALANCE CARD ───────────────────────────────────────────────────────── */
const BalCard = ({balance, cur, onEdit}) => {
  const [editing, setEditing] = useState(false);
  const [tmp, setTmp] = useState('');
  const save = () => { const v = parseFloat(tmp); if(!isNaN(v) && isFinite(v)) onEdit(v); setEditing(false); };
  return (
    <div className="relative rounded-3xl overflow-hidden" style={{background:'linear-gradient(135deg,#FF4785 0%,#C77DFF 100%)'}}>
      <div className="absolute inset-0 opacity-10 pointer-events-none"
           style={{backgroundImage:'radial-gradient(ellipse at 80% 10%, #fff 0%, transparent 55%)'}}/>
      <div className="absolute bottom-0 right-0 w-40 h-40 opacity-[0.07] pointer-events-none"
           style={{backgroundImage:'radial-gradient(circle, #fff 30%, transparent 70%)', transform:'translate(20%,20%)'}}/>
      <div className="relative p-6 text-white">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2 opacity-75">
            <I n="wallet" s={15} c=""/>
            <span className="text-sm font-medium tracking-wide">Current Balance</span>
          </div>
          <button onClick={()=>{setTmp(String(balance)); setEditing(!editing);}}
            className="opacity-70 hover:opacity-100 transition-opacity p-1">
            <I n="edit" s={15}/>
          </button>
        </div>
        {editing ? (
          <div className="flex items-center gap-2">
            <span className="font-display text-3xl">{cur}</span>
            <input type="number" value={tmp} onChange={e=>setTmp(e.target.value)} autoFocus
              onBlur={save} onKeyDown={e=>e.key==='Enter'&&save()}
              className="bg-white/20 rounded-xl px-3 py-1 font-display text-3xl text-white outline-none w-40 placeholder-white/50"/>
          </div>
        ) : (
          <div className="font-display text-4xl tracking-tight">{fmt(balance, cur)}</div>
        )}
        <div className="text-sm opacity-60 mt-1.5">Tap pencil to update</div>
      </div>
    </div>
  );
};

/* ── DASHBOARD ──────────────────────────────────────────────────────────── */
const Dashboard = ({income, bills, goals, settings, onSettings, onNav}) => {
  const {currency:cur, currentBalance:bal} = settings;
  const mIncome = useMemo(()=>income.reduce((s,x)=>s+toMonthly(x),0),[income]);
  const mBills  = useMemo(()=>bills.reduce((s,b)=>s+billMonthly(b),0),[bills]);
  const allUpcoming = useMemo(()=>{
    const end = new Date(); end.setDate(end.getDate()+14);
    return bills
      .filter(b=>{ const d=new Date(b.dueDate+'T00:00:00'); return d>=today&&d<=end&&!b.paid; })
      .sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  },[bills]);
  const upcoming = allUpcoming.slice(0,5);
  const upcomingTotal = allUpcoming.reduce((s,b)=>s+b.amount,0);
  const safe = bal - upcomingTotal;
  const net  = mIncome - mBills;

  return (
    <div className="space-y-4 slide-up">
      <BalCard balance={bal} cur={cur} onEdit={v=>onSettings({...settings,currentBalance:v})}/>

      {/* Quick stats 2×2 */}

        {[
          {label:'Safe to Spend', val:safe, sub:'after upcoming bills', dot:'bg-emerald-400', pos:safe>=0},
          {label:'Monthly Left',  val:net,  sub:'income minus bills',   dot:'bg-teal-400',   pos:net>=0},
          {label:'Monthly Income',val:mIncome,sub:`${income.length} source${income.length!==1?'s':''}`, dot:'bg-sage-400', always:true},
          {label:'Monthly Bills', val:mBills, sub:`${bills.length} bill${bills.length!==1?'s':''}`,    dot:'bg-rose-400',  always:true},
        ].map(({label,val,sub,dot,pos,always})=>(
          <div key={label} className="bg-white dark:bg-forest-800 rounded-2xl p-4 shadow-sm">
            <div className="flex items-center gap-1.5 mb-1">
              <div className={`w-2 h-2 rounded-full ${dot}`}/>
              <span className="text-[11px] font-medium text-gray-500 dark:text-gray-400">{label}</span>
            </div>
            <div className={`text-xl font-display font-medium ${always?'text-gray-800 dark:text-gray-200':pos?'text-sage-600 dark:text-sage-400':'text-rose-500'}`}>
              {fmt(val,cur)}
            </div>
            <div className="text-[11px] text-gray-400 dark:text-gray-500 mt-0.5">{sub}</div>
          </div>
        ))}
      </div>

      {/* Upcoming bills */}
      <div className="bg-white dark:bg-forest-800 rounded-3xl shadow-sm overflow-hidden">
        <div className="px-5 py-4 flex items-center justify-between border-b border-gray-50 dark:border-forest-700">
          <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200">Upcoming — next 14 days</h3>
          <div className="flex items-center gap-3">
            {allUpcoming.length>5&&<button onClick={()=>onNav('bills')} className="text-xs font-semibold text-sage-500 dark:text-sage-400">See all {allUpcoming.length}</button>}
            <span className="text-xs font-medium text-gray-400">{fmt(upcomingTotal,cur)}</span>
          </div>
        </div>
        {upcoming.length===0 ? (
          <div className="py-10 text-center">
            <div className="text-3xl mb-2">🌿</div>
            <p className="text-sm text-gray-400 dark:text-gray-500">All clear — no bills due!</p>
          </div>
        ) : upcoming.map(b=>{
          const c = CAT[b.category]||CAT.other;
          const days = Math.ceil((new Date(b.dueDate+'T00:00:00')-today)/86400000);
          return (
            <div key={b.id} className="flex items-center gap-3 px-5 py-3.5 border-b border-gray-50 dark:border-forest-700 last:border-0">
              <span className="text-xl">{c.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="font-medium text-sm text-gray-800 dark:text-gray-200 truncate">{b.name}</div>
                <div className="text-xs text-gray-400 dark:text-gray-500">
                  {days===0?'Today':days===1?'Tomorrow':`In ${days} days`}
                </div>
              </div>
              <div className="font-semibold text-sm text-gray-700 dark:text-gray-200">{fmt(b.amount,cur)}</div>
            </div>
          );
        })}
      </div>

      {/* Savings summary */}
      {goals.length>0 && (
        <div className="bg-white dark:bg-forest-800 rounded-3xl shadow-sm p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200">Savings Goals</h3>
            <span className="text-xs text-gray-400">{goals.length} active</span>
          </div>
          <div className="space-y-3.5">
            {goals.slice(0,3).map(g=>{
              const pct = Math.min((g.currentAmount/g.targetAmount)*100,100);
              return (

                    <span className="font-medium text-gray-700 dark:text-gray-300">{g.name}</span>

  );

/* ── SWIPE ROW ──────────────────────────────────────────────────────────── */
const SWIPE_WIDTH = 148;
const SWIPE_THRESHOLD = 60;

const SwipeRow = ({ id, openId, setOpenId, onPaid, onDelete, children }) => {
  const [offset, setOffset] = useState(0);
  const drag = useRef({startX:0, startOffset:0, active:false});
  const isOpen = openId === id;

  useEffect(() => { if (!isOpen) setOffset(0); }, [isOpen]);

  const onTouchStart = e => {
    drag.current = {startX: e.touches[0].clientX, startOffset: offset, active: true};
  };

  const onTouchMove = e => {
    if (!drag.current.active) return;
    const dx = e.touches[0].clientX - drag.current.startX;
    const next = Math.max(-SWIPE_WIDTH, Math.min(0, drag.current.startOffset + dx));
    if (Math.abs(dx) > 5) e.preventDefault();
    setOffset(next);
  };

  const onTouchEnd = () => {
    drag.current.active = false;
    if (offset < -SWIPE_THRESHOLD) {
      setOffset(-SWIPE_WIDTH);
      setOpenId(id);
    } else {
      setOffset(0);
      setOpenId(null);
    }
  };

  const close = () => { setOffset(0); setOpenId(null); };

  return (
    <div style={{position:'relative', overflow:'hidden', borderRadius:'1rem'}}>
      {/* Action buttons revealed on swipe */}
      <div style={{position:'absolute',top:0,right:0,bottom:0,width:SWIPE_WIDTH,display:'flex',borderRadius:'1rem',overflow:'hidden'}}>
        <button onClick={()=>{close(); onPaid();}}
          style={{flex:1,background:'#22c55e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,border:'none',cursor:'pointer'}}>
          <I n="check" s={20} c="text-white"/>
          <span style={{color:'#fff',fontSize:11,fontWeight:700}}>Paid</span>
        </button>
        <button onClick={()=>{close(); onDelete();}}
          style={{flex:1,background:'#ef4444',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,border:'none',cursor:'pointer'}}>
          <I n="trash" s={18} c="text-white"/>
          <span style={{color:'#fff',fontSize:11,fontWeight:700}}>Delete</span>
        </button>
      </div>
      {/* Swipeable card */}
      <div
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        onClick={isOpen ? close : undefined}
        style={{transform:`translateX(${offset}px)`, transition: drag.current.active ? 'none' : 'transform 0.25s ease', position:'relative', zIndex:1}}>
        {children}
      </div>
    </div>
  );
};

const BillsView = ({bills, setBills, settings, toast}) => {
  const cur = settings.currency;
  const [open, setOpen] = useState(false);
  const [ed, setEd] = useState(null);
  const [catFilter, setCat] = useState('all');
  const [confirmId, setConfirmId] = useState(null);

  const [f, setF] = useState(blank);

  const monthly = useMemo(()=>bills.reduce((s,b)=>s+billMonthly(b),0),[bills]);
  const usedCats = [...new Set(bills.map(b=>b.category))];
  const filtered = catFilter==='all'?bills:bills.filter(b=>b.category===catFilter);
  const sorted   = [...filtered].sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  const openAdd  = ()  => { setEd(null); setF(blank); setOpen(true); };
  const openEdit = b   => { setEd(b); setF({name:b.name,amount:String(b.amount),dueDate:b.dueDate,recurring:b.recurring,category:b.category,notes:b.notes||''}); setOpen(true); };
  const save = () => {
    const amt = parseFloat(f.amount);
    if(!f.name||!f.amount||isNaN(amt)||!isFinite(amt)||amt<=0) return;
    const item = {...f, id:ed?.id||genId(), amount:amt, paid:ed?.paid||false};
    setBills(ed ? bills.map(b=>b.id===item.id?item:b) : [...bills,item]);
    setOpen(false);
    toast(ed ? `"${item.name}" updated ✓` : `"${item.name}" added ✓`);
  };
  const del = b => {
    setBills(bills.filter(x=>x.id!==b.id));
    setConfirmId(null);
    toast(`"${b.name}" deleted`, {label:'Undo', fn:()=>setBills(prev=>[...prev,b])});
  };
  const togglePaid = b => {
    if (!b.paid && b.recurring !== 'once') {
      const due = new Date(b.dueDate + 'T00:00:00');
      const next = new Date(due);
      if      (b.recurring === 'weekly')      next.setDate(next.getDate() + 7);
      else if (b.recurring === 'fortnightly') next.setDate(next.getDate() + 14);
      else if (b.recurring === 'monthly')     next.setMonth(next.getMonth() + 1);
      else                                    next.setFullYear(next.getFullYear() + 1);
      const nextDate = next.toISOString().split('T')[0];
      setBills(bills.map(x => x.id === b.id ? {...x, paid:false, dueDate:nextDate} : x));
      toast(`"${b.name}" paid — next due ${fmtDate(nextDate)}`, {
        label: 'Undo',
        fn: () => setBills(prev => prev.map(x => x.id === b.id ? {...x, paid:false, dueDate:b.dueDate} : x))
      });
    } else {
      const next = !b.paid;
      setBills(bills.map(x => x.id === b.id ? {...x, paid:next} : x));
      if (next) toast(`"${b.name}" marked as paid`, {label:'Undo', fn:()=>setBills(prev=>prev.map(x=>x.id===b.id?{...x,paid:false}:x))});
    }
  };

        <div className="relative">
          <div className="flex gap-2 overflow-x-auto pb-1" style={{scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}>
            {['all',...usedCats].map(k=>{

              return (
                <button key={k} onClick={()=>setCat(k)}
                  className={`px-3.5 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap transition-colors flex items-center gap-1.5 flex-shrink-0 ${catFilter===k?'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900':'bg-white dark:bg-forest-800 text-gray-600 dark:text-gray-400'}`}>
                  {c&&<span>{c.icon}</span>}{k==='all'?'All':c.label}
                </button>
              );
            })}
          </div>
          <div className="absolute right-0 top-0 bottom-1 w-8 pointer-events-none bg-gradient-to-l from-[#FFF0F7] dark:from-forest-900 to-transparent"/>
        </div>
      )}

      <button onClick={openAdd} className="w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl border-2 border-dashed border-rose-300 dark:border-rose-800 text-rose-500 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors text-sm font-semibold">
        <I n="plus" s={16}/> Add Bill or Expense

      {sorted.length===0 ? (
        <div className="bg-white dark:bg-forest-800 rounded-3xl p-12 text-center shadow-sm">
          <div className="text-4xl mb-3">📋</div>
          <p className="text-sm text-gray-400 dark:text-gray-500">No bills here yet.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {sorted.map(b=>{
            const c = CAT[b.category]||CAT.other;
            const overdue = !b.paid && new Date(b.dueDate+'T00:00:00') < today;

                    </div>

            <Btn v="secondary" cl="flex-1" onClick={()=>setOpen(false)}>Cancel</Btn>
            <Btn cl="flex-1" onClick={save}>Save</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

/* ── CALENDAR VIEW ──────────────────────────────────────────────────────── */
const CalendarView = ({bills, income, goals, settings}) => {
  const cur = settings?.currency || '€';
  const [view, setView] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [sel, setSel] = useState(null);
  const Y = view.getFullYear(), M = view.getMonth();
  const dim = new Date(Y,M+1,0).getDate();
  const first = (() => { const d=new Date(Y,M,1).getDay(); return d===0?6:d-1; })();

  const eventsOn = d => {
    const ds = dStr(Y,M,d);
    return [
      ...bills.filter(b=>b.dueDate===ds).map(b=>({type:'bill',label:b.name,amount:b.amount,color:CAT[b.category]?.color||'#888',icon:CAT[b.category]?.icon||'📌',paid:b.paid})),
      ...income.filter(x=>x.nextDate===ds).map(x=>({type:'income',label:x.name,amount:x.amount,color:x.color,icon:'💰'})),
      ...goals.filter(g=>g.deadline===ds).map(g=>({type:'goal',label:g.name,amount:g.targetAmount-g.currentAmount,color:g.color,icon:'🎯'})),
    ];
  };

  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let i=1;i<=dim;i++) cells.push(i);

  const selEvs = sel ? eventsOn(sel) : [];
  const monthLabel = view.toLocaleDateString('en-IE',{month:'long',year:'numeric'});

  return (
    <div className="space-y-4 slide-up">
      <div className="bg-white dark:bg-forest-800 rounded-3xl shadow-sm p-4">
        {/* Nav */}
        <div className="flex items-center justify-between mb-4">
          <button onClick={()=>setView(new Date(Y,M-1,1))} className="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-forest-700 transition-colors">
            <I n="left" s={18} c="text-gray-600 dark:text-gray-300"/>
          </button>
          <h2 className="font-display text-xl text-gray-800 dark:text-gray-100">{monthLabel}</h2>
          <button onClick={()=>setView(new Date(Y,M+1,1))} className="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-forest-700 transition-colors">
            <I n="right" s={18} c="text-gray-600 dark:text-gray-300"/>
          </button>
        </div>
        {/* Day headers */}
        <div className="grid grid-cols-7 mb-1">
          {['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>(
            <div key={d} className="text-center text-[11px] font-semibold text-gray-400 dark:text-gray-500 py-1">{d}</div>
          ))}
        </div>
        {/* Grid */}
        <div className="grid grid-cols-7 gap-0.5">
          {cells.map((d,i)=>{
            if(!d) return <div key={`e-${i}`}/>;
            const evs = eventsOn(d);
            const isToday = d===today.getDate()&&M===today.getMonth()&&Y===today.getFullYear();
            const isSel = d===sel;
            const hasBill=evs.some(e=>e.type==='bill'), hasInc=evs.some(e=>e.type==='income'), hasGoal=evs.some(e=>e.type==='goal');
            return (
              <button key={`d-${d}`} onClick={()=>setSel(d===sel?null:d)}
                className={`aspect-square flex flex-col items-center justify-center rounded-xl text-xs transition-all ${isSel?'bg-sage-500 text-white':isToday?'bg-sage-100 dark:bg-sage-900/40 text-sage-700 dark:text-sage-300 font-bold':'hover:bg-gray-50 dark:hover:bg-forest-700 text-gray-700 dark:text-gray-300'}`}>
                <span className={`text-xs ${isToday?'font-bold':''}`}>{d}</span>
                {evs.length>0&&(
                  <div className="flex gap-0.5 mt-0.5">
                    {hasBill&&<div className="w-1.5 h-1.5 rounded-full bg-rose-400"/>}
                    {hasInc&&<div className="w-1.5 h-1.5 rounded-full bg-sage-400"/>}
                    {hasGoal&&<div className="w-1.5 h-1.5 rounded-full bg-violet-400"/>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
        {/* Legend */}
        <div className="flex gap-5 mt-4 pt-3 border-t border-gray-50 dark:border-forest-700 justify-center">
          {[['bg-rose-400','Bills'],['bg-sage-400','Income'],['bg-violet-400','Goals']].map(([cls,lbl])=>(
            <div key={lbl} className="flex items-center gap-1.5 text-[11px] text-gray-500 dark:text-gray-400">
              <div className={`w-2 h-2 rounded-full ${cls}`}/>{lbl}
            </div>
          ))}
        </div>
      </div>

      {/* Empty hint */}
      {!sel&&(
        <div className="bg-white dark:bg-forest-800 rounded-3xl shadow-sm p-6 text-center">
          <div className="text-3xl mb-2">📅</div>
          <p className="text-sm font-medium text-gray-600 dark:text-gray-300">Tap a date to see what's on</p>
          <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Bills, paydays and goal deadlines appear here</p>
        </div>
      )}

      {/* Day detail */}
      {sel&&(
        <div className="bg-white dark:bg-forest-800 rounded-3xl shadow-sm overflow-hidden scale-in">
          <div className="px-5 py-4 border-b border-gray-50 dark:border-forest-700">
            <h3 className="font-semibold text-gray-800 dark:text-gray-200">
              {new Date(Y,M,sel).toLocaleDateString('en-IE',{weekday:'long',day:'numeric',month:'long'})}
            </h3>
          </div>
          {selEvs.length===0 ? (
            <div className="py-10 text-center">
              <div className="text-3xl mb-2">🌿</div>
              <p className="text-sm text-gray-400 dark:text-gray-500">Nothing scheduled</p>
            </div>
          ) : selEvs.map((ev,i)=>(
            <div key={i} className="flex items-center gap-3 px-5 py-3.5 border-b border-gray-50 dark:border-forest-700 last:border-0">
              <span className="text-xl">{ev.icon}</span>
              <div className="flex-1">
                <div className="font-medium text-sm text-gray-800 dark:text-gray-200">{ev.label}</div>
                <div className="text-[11px] text-gray-400 capitalize">{ev.type}{ev.paid?' · Paid':''}</div>
              </div>
              <div className="font-bold text-sm" style={{color:ev.color}}>
                {ev.type==='income'?'+':''}{fmt(ev.amount,cur)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ── GOALS VIEW ─────────────────────────────────────────────────────────── */
const GoalsView = ({goals, setGoals, settings, toast}) => {
  const cur = settings.currency;
  const [open, setOpen] = useState(false);
  const [ed, setEd] = useState(null);
  const [addId, setAddId] = useState(null);
  const [addAmt, setAddAmt] = useState('');
  const blank = {name:'',targetAmount:'',currentAmount:'0',deadline:'',color:GOAL_COLORS[0],notes:''};
  const [f, setF] = useState(blank);

  const totalSaved  = goals.reduce((s,g)=>s+g.currentAmount,0);
  const totalTarget = goals.reduce((s,g)=>s+g.targetAmount,0);

  const [confirmId, setConfirmId] = useState(null);
  const openAdd  = ()  => { setEd(null); setF(blank); setOpen(true); };
  const openEdit = g   => { setEd(g); setF({name:g.name,targetAmount:String(g.targetAmount),currentAmount:String(g.currentAmount),deadline:g.deadline||'',color:g.color,notes:g.notes||''}); setOpen(true); };
  const save = () => {
    const target = parseFloat(f.targetAmount);
    const current = parseFloat(f.currentAmount) || 0;
    if(!f.name||!f.targetAmount||isNaN(target)||!isFinite(target)||target<=0) return;
    const item = {...f, id:ed?.id||genId(), targetAmount:target, currentAmount:current};
    setGoals(ed ? goals.map(g=>g.id===item.id?item:g) : [...goals,item]);
    setOpen(false);
    toast(ed ? `"${item.name}" updated ✓` : `"${item.name}" created ✓`);
  };
  const del = g => {
    setGoals(goals.filter(x=>x.id!==g.id));
    setConfirmId(null);
    toast(`"${g.name}" deleted`, {label:'Undo', fn:()=>setGoals(prev=>[...prev,g])});
  };
  const addFunds = id => {
    const amt = parseFloat(addAmt);
    if(isNaN(amt)||amt<=0) return;
    const g = goals.find(x=>x.id===id);
    const newAmt = Math.min(g.currentAmount+amt, g.targetAmount);
    setGoals(goals.map(x=>x.id===id?{...x,currentAmount:newAmt}:x));
    setAddId(null); setAddAmt('');
    toast(`${fmt(amt,cur)} added to "${g.name}" ✓`);
  };
  const selectedGoal = goals.find(g=>g.id===addId);

  return (
    <div className="space-y-4 slide-up">
      <div className="rounded-3xl p-5 text-white" style={{background:'linear-gradient(135deg,#A855F7,#4895EF)'}}>
        <div className="text-sm opacity-75 mb-1">Total Saved</div>
        <div className="font-display text-3xl">{fmt(totalSaved,cur)}</div>
        {totalTarget>0&&(
          <>
            <div className="mt-3 h-1.5 bg-white/20 rounded-full overflow-hidden">
              <div className="h-full bg-white rounded-full transition-all" style={{width:`${Math.min((totalSaved/totalTarget)*100,100)}%`}}/>
            </div>
            <div className="text-sm opacity-60 mt-1.5">of {fmt(totalTarget,cur)} across {goals.length} goal{goals.length!==1?'s':''}</div>
          </>
        )}
      </div>

      <button onClick={openAdd} className="w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl border-2 border-dashed border-violet-300 dark:border-violet-800 text-violet-600 dark:text-violet-400 hover:bg-violet-50 dark:hover:bg-violet-900/20 transition-colors text-sm font-semibold">
        <I n="plus" s={16}/> Create Savings Goal
      </button>

      {goals.length===0 ? (
        <div className="bg-white dark:bg-forest-800 rounded-3xl p-12 text-center shadow-sm">
          <div className="text-4xl mb-3">🎯</div>
          <p className="text-sm text-gray-400 dark:text-gray-500">No goals yet.<br/>Create one to start tracking.</p>
        </div>
      ) : (
        <div className="space-y-4">
          {goals.map(g=>{
            const pct = Math.min((g.currentAmount/g.targetAmount)*100,100);
            const rem  = g.targetAmount-g.currentAmount;
            const done = g.currentAmount>=g.targetAmount;
            const moLeft = g.deadline ? Math.max(0,Math.ceil((new Date(g.deadline+'T00:00:00')-today)/(30*86400000))) : null;
            const sugg = moLeft>0 ? rem/moLeft : null;
            return (
              <div key={g.id} className="bg-white dark:bg-forest-800 rounded-3xl p-5 shadow-sm">
                <div className="flex items-start justify-between mb-4">
                  <div className="flex items-center gap-3 flex-1 min-w-0 mr-2">
                    <div className="w-11 h-11 rounded-2xl flex items-center justify-center text-xl flex-shrink-0" style={{backgroundColor:g.color+'18'}}>🎯</div>
                    <div className="min-w-0">
                      <div className="font-bold text-gray-800 dark:text-gray-200 truncate">{g.name}</div>
                      {g.notes&&<div className="text-xs text-gray-400 mt-0.5 truncate">{g.notes}</div>}
                    </div>
                  </div>
                  <div className="flex gap-1 items-center flex-shrink-0">
                    {confirmId===g.id ? (
                      <div className="flex items-center gap-1.5 text-xs">
                        <span className="text-gray-400">Delete?</span>
                        <button onClick={()=>del(g)} className="font-bold text-rose-500">Yes</button>
                        <button onClick={()=>setConfirmId(null)} className="text-gray-400">No</button>
                      </div>
                    ) : (
                      <>
                        <button onClick={()=>openEdit(g)} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-forest-700"><I n="edit" s={13} c="text-gray-400"/></button>
                        <button onClick={()=>setConfirmId(g.id)} className="p-1.5 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-900/20"><I n="trash" s={13} c="text-rose-400"/></button>
                      </>
                    )}
                  </div>
                </div>

                <div className="mb-3">
                  <div className="flex justify-between text-xs mb-1.5">
                    <span className="text-gray-600 dark:text-gray-400">{fmt(g.currentAmount,cur)} saved</span>
                    <span className="font-bold" style={{color:g.color}}>{Math.round(pct)}%</span>
                  </div>
                  <ProgressBar pct={pct} color={g.color} striped h="h-3.5"/>
                  <div className="flex justify-between text-[11px] mt-1.5 text-gray-400">
                    <span>{done?'🎉 Complete!':fmt(rem,cur)+' to go'}</span>
                    <span>Goal: {fmt(g.targetAmount,cur)}</span>
                  </div>
                </div>

                {(g.deadline||sugg)&&(
                  <div className="flex flex-wrap gap-2 mb-3">
                    {g.deadline&&<span className="text-[11px] bg-gray-100 dark:bg-forest-700 text-gray-600 dark:text-gray-400 px-2.5 py-1 rounded-full">📅 {moLeft!==null?`${moLeft}mo left · `:''}{fmtDate(g.deadline)}</span>}
                    {sugg&&!done&&<span className="text-[11px] px-2.5 py-1 rounded-full font-medium" style={{backgroundColor:g.color+'18',color:g.color}}>💡 {fmt(sugg,cur)}/mo suggested</span>}
                  </div>
                )}

                {!done&&(
                  <button onClick={()=>{setAddId(g.id);setAddAmt('');}} className="w-full py-2.5 rounded-xl text-xs font-semibold border border-dashed transition-colors"
                    style={{borderColor:g.color+'66',color:g.color}}>+ Add Funds</button>
                )}
              </div>
            );
          })}
        </div>
      )}

      <Modal open={open} close={()=>setOpen(false)} title={ed?'Edit Goal':'New Savings Goal'}>
        <div className="space-y-4">
          <Fld label="Goal Name" placeholder="e.g. Emergency Fund" value={f.name} onChange={e=>setF({...f,name:e.target.value})} maxLength={80}/>
          <div className="grid grid-cols-2 gap-3">
            <Fld label="Target Amount" type="number" placeholder="0.00" value={f.targetAmount} onChange={e=>setF({...f,targetAmount:e.target.value})}/>
            <Fld label="Already Saved" type="number" placeholder="0.00" value={f.currentAmount} onChange={e=>setF({...f,currentAmount:e.target.value})}/>
          </div>
          <Fld label="Deadline (optional)" type="date" value={f.deadline} onChange={e=>setF({...f,deadline:e.target.value})}/>
          <Txt label="Notes (optional)" placeholder="What's this goal for?" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})}/>
          <div>
            <label className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2 block">Color</label>
            <ColorPicker colors={GOAL_COLORS} value={f.color} onChange={c=>setF({...f,color:c})}/>
          </div>
          <div className="flex gap-3 pt-1">
            <Btn v="secondary" cl="flex-1" onClick={()=>setOpen(false)}>Cancel</Btn>
            <Btn cl="flex-1" onClick={save}>Save Goal</Btn>
          </div>
        </div>
      </Modal>

      <Modal open={!!addId} close={()=>{setAddId(null);setAddAmt('');}} title={selectedGoal?`Add Funds — ${selectedGoal.name}`:'Add Funds'}>
        {selectedGoal&&(
          <div className="space-y-4">
            <div className="flex justify-between text-sm bg-gray-50 dark:bg-forest-700 rounded-2xl px-4 py-3">
              <span className="text-gray-500 dark:text-gray-400">Saved: <strong className="text-gray-800 dark:text-gray-200">{fmt(selectedGoal.currentAmount,cur)}</strong></span>
              <span className="text-gray-500 dark:text-gray-400">Goal: <strong className="text-gray-800 dark:text-gray-200">{fmt(selectedGoal.targetAmount,cur)}</strong></span>
            </div>
            <ProgressBar pct={(selectedGoal.currentAmount/selectedGoal.targetAmount)*100} color={selectedGoal.color} h="h-2"/>
            <Fld label="Amount to Add" type="number" placeholder="0.00" value={addAmt} onChange={e=>setAddAmt(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&addFunds(addId)}/>
            <div className="flex gap-3 pt-1">
              <Btn v="secondary" cl="flex-1" onClick={()=>{setAddId(null);setAddAmt('');}}>Cancel</Btn>
              <Btn cl="flex-1" onClick={()=>addFunds(addId)}>Add Funds</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
};

/* ── FORECAST VIEW ──────────────────────────────────────────────────────── */
const ForecastView = ({income, bills, settings}) => {
  const {currency:cur, currentBalance:bal} = settings;
  const mInc  = useMemo(()=>income.reduce((s,x)=>s+toMonthly(x),0),[income]);
  const mBill = useMemo(()=>bills.reduce((s,b)=>s+billMonthly(b),0),[bills]);
  const net   = mInc - mBill;

  const months = useMemo(()=>{
    const out=[]; let b=bal;
    for(let i=0;i<6;i++){
      const d=new Date(today.getFullYear(),today.getMonth()+i,1);
      b+=net;
      out.push({label:d.toLocaleDateString('en-IE',{month:'short'}),balance:b,income:mInc,bills:mBill});
    }
    return out;
  },[bal,net,mInc,mBill]);

  /* SVG Bar Chart */
  const [selBar, setSelBar] = useState(null);
  const BarChart = () => {
    const maxV = Math.max(...months.flatMap(m=>[m.income,m.bills]),1);
    const W=300, H=130, bw=22, gap=(W-months.length*bw*2)/(months.length+1);
    return (
      <div>
        <svg viewBox={`0 0 ${W} ${H+28}`} className="w-full">
          {months.map((m,i)=>{
            const ih=(m.income/maxV)*H, bh=(m.bills/maxV)*H;
            const x=gap+i*(bw*2+gap);
            const sel = selBar===i;
            return (
              <g key={i} onClick={()=>setSelBar(sel?null:i)} style={{cursor:'pointer'}}>
                {sel&&<rect x={x-4} y={0} width={bw*2+10} height={H} fill="rgba(0,0,0,0.05)" rx="4"/>}
                <rect x={x}      y={H-ih} width={bw} height={ih} fill="#4A7C59" rx="5" opacity={sel?1:0.85}/>
                <rect x={x+bw+2} y={H-bh} width={bw} height={bh} fill="#E07A5F" rx="5" opacity={sel?1:0.85}/>
                <text x={x+bw+1} y={H+18} textAnchor="middle" fontSize="10" fill={sel?"#FF4785":"#9CA3AF"} fontWeight={sel?"bold":"normal"}>{m.label}</text>
              </g>
            );
          })}
          <line x1="0" y1={H} x2={W} y2={H} stroke="#E5E7EB" strokeWidth="1"/>
        </svg>
        {selBar!==null&&months[selBar]&&(
          <div className="mt-2 p-3 rounded-2xl bg-gray-50 dark:bg-forest-700 text-xs flex justify-around">
            <span className="text-gray-500 dark:text-gray-400">Income: <strong className="text-emerald-600 dark:text-emerald-400">{fmt(months[selBar].income,cur)}</strong></span>
            <span className="text-gray-500 dark:text-gray-400">Bills: <strong className="text-rose-500">{fmt(months[selBar].bills,cur)}</strong></span>
            <span className="text-gray-500 dark:text-gray-400">Net: <strong className={net>=0?'text-sage-600 dark:text-sage-400':'text-rose-500'}>{net>=0?'+':''}{fmt(months[selBar].income-months[selBar].bills,cur)}</strong></span>
          </div>
        )}
      </div>
    );
  };

  /* SVG Line Chart */
  const LineChart = () => {
    const vals = months.map(m=>m.balance);
    const minV=Math.min(...vals,0), maxV=Math.max(...vals,1);
    const W=300, H=110, px=12, innerW=W-px*2;
    const pts = months.map((m,i)=>{
      const x=px+(i/(months.length-1))*innerW;
      const y=H-((m.balance-minV)/(maxV-minV||1))*(H-24)-8;
      return [x,y];
    });
    const poly = pts.map(([x,y])=>`${x},${y}`).join(' ');
    const area = `${pts[0][0]},${H} ${poly} ${pts[pts.length-1][0]},${H}`;
    return (
      <svg viewBox={`0 0 ${W} ${H+28}`} className="w-full">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#3AAFA9" stopOpacity="0.25"/>
            <stop offset="100%" stopColor="#3AAFA9" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={area} fill="url(#lg)"/>
        <polyline points={poly} fill="none" stroke="#3AAFA9" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map(([x,y],i)=>(
          <g key={i}>
            <circle cx={x} cy={y} r="4" fill="#3AAFA9" stroke="white" strokeWidth="2"/>
            <text x={x} y={H+18} textAnchor="middle" fontSize="10" fill="#9CA3AF">{months[i].label}</text>
          </g>
        ))}
        <line x1="0" y1={H} x2={W} y2={H} stroke="#E5E7EB" strokeWidth="1"/>
      </svg>
    );
  };

  const catBreak = useMemo(()=>{
    const t={};
    bills.forEach(b=>{ t[b.category]=(t[b.category]||0)+billMonthly(b); });
    return Object.entries(t).sort((a,b)=>b[1]-a[1]);
  },[bills]);

  return (
    <div className="space-y-4 slide-up">
      <div className="rounded-3xl p-5 text-white" style={{background:'linear-gradient(135deg,#00C9B1,#FF4785)'}}>
        <div className="text-sm opacity-75 mb-1">Monthly Net Cash Flow</div>
        <div className="font-display text-3xl">{net>=0?'+':''}{fmt(net,cur)}</div>
        <div className="text-sm opacity-60 mt-1">income minus all bills</div>
      </div>

      <div className="bg-white dark:bg-forest-800 rounded-3xl p-5 shadow-sm">
        <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200">Income vs Expenses</h3>
        <p className="text-xs text-gray-400 dark:text-gray-500 mb-4">Next 6 months projection</p>
        <BarChart/>
        <div className="flex justify-center gap-6 mt-1">
          {[['#4A7C59','Income'],['#E07A5F','Expenses']].map(([c,l])=>(
            <div key={l} className="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
              <div className="w-3 h-3 rounded" style={{backgroundColor:c}}/>{l}
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white dark:bg-forest-800 rounded-3xl p-5 shadow-sm">
        <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200">Balance Forecast</h3>
        <p className="text-xs text-gray-400 dark:text-gray-500 mb-4">Projected account balance</p>
        <LineChart/>
      </div>

      <div className="bg-white dark:bg-forest-800 rounded-3xl p-5 shadow-sm">
        <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200 mb-3">Monthly Summary</h3>
        {[
          {label:'Total Income',  val:fmt(mInc,cur),  cls:'text-sage-600 dark:text-sage-400',  prefix:'+'},
          {label:'Total Bills',   val:fmt(mBill,cur), cls:'text-rose-500',                     prefix:'-'},
          {label:'Net Monthly',   val:fmt(Math.abs(net),cur), cls:net>=0?'text-sage-600 dark:text-sage-400':'text-rose-500', prefix:net>=0?'+':'-', bold:true},
        ].map(({label,val,cls,prefix,bold})=>(
          <div key={label} className={`flex justify-between items-center py-2.5 border-b border-gray-50 dark:border-forest-700 last:border-0 ${bold?'font-bold':''}`}>
            <span className={`text-sm ${bold?'text-gray-800 dark:text-gray-200':'text-gray-600 dark:text-gray-400'}`}>{label}</span>
            <span className={`text-sm font-semibold ${cls}`}>{prefix}{val}</span>
          </div>
        ))}
      </div>

      {catBreak.length>0&&(
        <div className="bg-white dark:bg-forest-800 rounded-3xl p-5 shadow-sm pb-6">
          <h3 className="font-semibold text-sm text-gray-800 dark:text-gray-200 mb-4">Spend by Category</h3>
          <div className="space-y-3">
            {catBreak.map(([cat,amt])=>{
              const c=CAT[cat]||CAT.other;
              const pct=(amt/mBill)*100;
              return (
                <div key={cat}>
                  <div className="flex justify-between text-xs mb-1.5">
                    <span className="flex items-center gap-1.5 text-gray-700 dark:text-gray-300">{c.icon} {c.label}</span>
                    <span className="text-gray-500 dark:text-gray-400 font-medium">{fmt(amt,cur)}</span>
                  </div>
                  <ProgressBar pct={pct} color={c.color} h="h-1.5"/>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

/* ── SETTINGS MODAL ─────────────────────────────────────────────────────── */
const SettingsModal = ({open, close, settings, onSettings, onExport, onExportJSON, onImportJSON, notifPerm, onRequestNotifs}) => (
  <Modal open={open} close={close} title="Settings">
    <div className="space-y-4">
      {/* Dark mode */}
      <div className="flex items-center justify-between p-4 bg-gray-50 dark:bg-forest-700 rounded-2xl">
        <div>
          <div className="font-semibold text-sm text-gray-800 dark:text-gray-200">Dark Mode</div>
          <div className="text-xs text-gray-400 mt-0.5">Switch theme</div>
        </div>
        <button onClick={()=>onSettings({...settings,darkMode:!settings.darkMode})}
          className={`w-12 h-6 rounded-full relative transition-colors ${settings.darkMode?'bg-sage-500':'bg-gray-300'}`}>
          <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-transform ${settings.darkMode?'translate-x-6':'translate-x-0.5'}`}/>
        </button>
      </div>
      {/* Currency */}
      <div className="p-4 bg-gray-50 dark:bg-forest-700 rounded-2xl">
        <div className="font-semibold text-sm text-gray-800 dark:text-gray-200 mb-3">Currency</div>
        <div className="grid grid-cols-5 gap-2">
          {['€','$','£','¥','A$'].map(c=>(
            <button key={c} onClick={()=>onSettings({...settings,currency:c})}
              className={`py-2.5 rounded-xl text-sm font-bold transition-colors ${settings.currency===c?'bg-sage-500 text-white':'bg-white dark:bg-forest-800 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-forest-600'}`}>{c}</button>
          ))}
        </div>
      </div>
      {/* Notifications */}
      <div className="flex items-center justify-between p-4 bg-gray-50 dark:bg-forest-700 rounded-2xl">
        <div>
          <div className="font-semibold text-sm text-gray-800 dark:text-gray-200">Bill Reminders</div>
          <div className="text-xs text-gray-400 mt-0.5">
            {notifPerm==='granted'     ? '✅ Enabled — you\'ll be notified of due bills'
            : notifPerm==='denied'     ? '🚫 Blocked — enable in browser Site Settings'
            : notifPerm==='unsupported'? 'Not supported on this browser'
            : 'Get notified when bills are due soon'}
          </div>
        </div>
        {notifPerm==='default' && (
          <button onClick={onRequestNotifs}
            className="px-3 py-1.5 rounded-xl text-xs font-bold bg-sage-500 text-white flex-shrink-0">Enable</button>
        )}
      </div>
      {/* Data */}
      <div className="p-4 bg-gray-50 dark:bg-forest-700 rounded-2xl space-y-2">
        <div className="font-semibold text-sm text-gray-800 dark:text-gray-200 mb-3">Data</div>
        <button onClick={()=>{onExportJSON(); close();}}
          className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white dark:bg-forest-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-forest-600 transition-colors text-sm font-semibold">
          💾 Backup to JSON
        </button>
        <label className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white dark:bg-forest-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-forest-600 transition-colors text-sm font-semibold cursor-pointer">
          📂 Restore from JSON
          <input type="file" accept=".json" className="hidden" onChange={e=>{onImportJSON(e); close();}}/>
        </label>
        <button onClick={()=>{onExport(); close();}}
          className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white dark:bg-forest-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-forest-600 transition-colors text-sm font-semibold">
          📊 Export as CSV
        </button>
      </div>
      {/* Privacy note */}
      <div className="p-4 bg-amber-50 dark:bg-amber-900/15 rounded-2xl flex gap-3">
        <I n="info" s={16} c="text-amber-500 flex-shrink-0 mt-0.5"/>
        <p className="text-xs text-amber-700 dark:text-amber-400 leading-relaxed">All data is stored privately on your device. No bank connection, no account required.</p>
      </div>
      <Btn cl="w-full" onClick={close}>Done</Btn>
    </div>
  </Modal>
);

/* ── BOTTOM NAV ─────────────────────────────────────────────────────────── */
const NAV = [
  {id:'dashboard', icon:'home',   label:'Home'},
  {id:'income',    icon:'income', label:'Income'},
  {id:'bills',     icon:'bills',  label:'Bills'},
  {id:'calendar',  icon:'cal',    label:'Calendar'},
  {id:'goals',     icon:'goals',  label:'Goals'},
  {id:'forecast',  icon:'chart',  label:'Forecast'},
];

const BottomNav = ({active, onChange, billBadge}) => (
  <div className="nav-container fixed bottom-0 left-0 right-0 z-40 flex justify-center pointer-events-none">
    <div className="w-full max-w-lg pointer-events-auto bg-white/92 dark:bg-forest-800/92 backdrop-blur-xl border-t border-gray-100 dark:border-forest-700 pb-safe">
      <div className="flex">
        {NAV.map(t=>(
          <button key={t.id} onClick={()=>onChange(t.id)}
            className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 transition-all relative ${active===t.id?'text-sage-600 dark:text-sage-400':'text-gray-400 dark:text-gray-500'}`}>
            {active===t.id&&<div className="absolute top-0 left-1/2 -translate-x-1/2 w-6 h-0.5 rounded-full bg-sage-500"/>}
            <div className={`transition-transform relative ${active===t.id?'scale-110':''}`}>
              <I n={t.icon} s={20}/>
              {t.id==='bills' && billBadge > 0 && (
                <span className="absolute -top-1 -right-1.5 min-w-[14px] h-3.5 px-0.5 rounded-full bg-rose-500 text-white flex items-center justify-center" style={{fontSize:9,fontWeight:700,lineHeight:1}}>
                  {billBadge > 9 ? '9+' : billBadge}
                </span>
              )}
            </div>
            <span className="text-[10px] font-semibold">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  </div>
);

/* ── FAB ─────────────────────────────────────────────────────────────────── */
const FAB = ({onNav}) => {
  const [open, setOpen] = useState(false);
  const items = [
    {label:'Add Goal',   color:'#A855F7', tab:'goals'},

          {it.label}

        +

/* ── APP ROOT ────────────────────────────────────────────────────────────── */
const App = () => {
  const [inited,  setInited]  = useLS('cc_v2_init',  false);
  const [income,  setIncome]  = useLS('cc_v2_income', []);
  const [bills,   setBills]   = useLS('cc_v2_bills',  []);
  const [goals,   setGoals]   = useLS('cc_v2_goals',  []);
  const [settings,setSettings]= useLS('cc_v2_settings', DEMO_SETTINGS);
  const [tab,     setTab]     = useState('dashboard');
  const [showSett,setShowSett]= useState(false);
  const [notifPerm, setNotifPerm] = useState(() => 'Notification' in window ? Notification.permission : 'unsupported');
  const [toasts,  setToasts]  = useState([]);
  const toast = useCallback((msg, action=null) => {
    const id = genId();
    setToasts(ts=>[...ts,{id,msg,action}]);
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)), 3500);
  }, []);

  /* Demo data on first run */
  useEffect(()=>{
    if(!inited){ setIncome(DEMO_INCOME); setBills(DEMO_BILLS); setGoals(DEMO_GOALS); setInited(true); }
  },[inited]);

  /* Dark mode */
  useEffect(()=>{
    document.documentElement.classList.toggle('dark', settings.darkMode);
  },[settings.darkMode]);

  /* Auto-reset paid recurring bills whose due date has rolled into a new month */
  useEffect(()=>{
    if(!bills.length) return;
    const now = new Date();
    let changed = false;
    const updated = bills.map(b => {
      if(!b.paid || b.recurring==='once') return b;
      const due = new Date(b.dueDate+'T00:00:00');
      if(due.getFullYear() < now.getFullYear() || due.getMonth() < now.getMonth()) {
        changed = true;
        const next = new Date(due);
        const inc = b.recurring==='weekly' ? ()=>next.setDate(next.getDate()+7)
                  : b.recurring==='fortnightly' ? ()=>next.setDate(next.getDate()+14)
                  : b.recurring==='monthly' ? ()=>next.setMonth(next.getMonth()+1)
                  : ()=>next.setFullYear(next.getFullYear()+1);
        while(next < now) inc();
        return {...b, paid:false, dueDate: next.toISOString().split('T')[0]};
      }
      return b;
    });
    if(changed) setBills(updated);
  },[bills]);

  /* Auto-advance income nextDate when it's passed */
  useEffect(()=>{
    if(!income.length) return;
    const now = new Date();
    let changed = false;
    const updated = income.map(src => {
      if(src.frequency==='once') return src;
      const next = new Date(src.nextDate+'T00:00:00');
      if(next >= now) return src;
      changed = true;
      const advance = new Date(next);
      const bump = src.frequency==='weekly'       ? ()=>advance.setDate(advance.getDate()+7)
                 : src.frequency==='fortnightly'  ? ()=>advance.setDate(advance.getDate()+14)
                 : src.frequency==='monthly'      ? ()=>advance.setMonth(advance.getMonth()+1)
                 : ()=>advance.setFullYear(advance.getFullYear()+1);
      while(advance < now) bump();
      return {...src, nextDate: advance.toISOString().split('T')[0]};
    });
    if(changed) setIncome(updated);
  },[income]);

  /* App badge — unpaid bills due within 7 days */
  useEffect(()=>{
    if(!('setAppBadge' in navigator)) return;
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()+7);
    const count = bills.filter(b=>!b.paid && new Date(b.dueDate+'T00:00:00')<=cutoff).length;
    count > 0 ? navigator.setAppBadge(count) : navigator.clearAppBadge?.();
  },[bills]);

  /* Bill notifications on open — 7-day window */
  useEffect(()=>{
    if(notifPerm!=='granted' || !bills.length) return;
    const now = new Date();
    bills.forEach(b=>{
      if(b.paid) return;
      const due = new Date(b.dueDate+'T00:00:00');
      const days = Math.round((due - now) / 86400000);
      if(days < 0)
        new Notification('⚠️ Overdue bill',{body:`${b.name} was due ${fmtDate(b.dueDate)} — ${fmt(b.amount,settings.currency)}`, tag:b.id});
      else if(days === 0)
        new Notification('💸 Due today',{body:`${b.name} — ${fmt(b.amount,settings.currency)}`, tag:b.id});
      else if(days === 1)
        new Notification('📅 Due tomorrow',{body:`${b.name} — ${fmt(b.amount,settings.currency)}`, tag:b.id});
      else if(days <= 7)
        new Notification(`📆 Due in ${days} days`,{body:`${b.name} — ${fmt(b.amount,settings.currency)}`, tag:b.id});
    });
  },[notifPerm]);

  /* CSV export */
  const exportJSON = () => {
    const data = {version:1, exportedAt:new Date().toISOString(), income, bills, goals, settings};
    const a = Object.assign(document.createElement('a'),{
      href: 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data, null, 2)),
      download: `calmcash-backup-${todayStr}.json`
    });
    a.click();
  };

  const importJSON = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !Array.isArray(data.income) || !Array.isArray(data.bills) || !Array.isArray(data.goals)) {
          toast('Invalid backup file');
          return;
        }
        setIncome(data.income);
        setBills(data.bills);
        setGoals(data.goals);
        if (data.settings) setSettings(data.settings);
        toast('Data restored successfully ✓');
      } catch {
        toast('Could not read backup file');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const exportCSV = () => {
    const rows = [['Type','Name','Amount','Frequency','Category','Notes','Extra']];
    income.forEach(x=>rows.push(['Income',x.name,x.amount,x.frequency,'','',`Next: ${x.nextDate}`]));
    bills.forEach(b=>rows.push(['Bill',b.name,b.amount,b.recurring,b.category,b.notes||'',b.paid?'Paid':'Unpaid']));
    goals.forEach(g=>rows.push(['Goal',g.name,g.targetAmount,'',`Saved: ${g.currentAmount}`,'',`Deadline: ${g.deadline}`]));
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),download:'calmcash-export.csv'});
    a.click();
  };

  /* Request notifications */
  const requestNotifs = async () => {
    if(!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
  };

  const TAB_TITLES = {dashboard:'CalmCash',income:'Income',bills:'Bills & Expenses',calendar:'Calendar',goals:'Savings Goals',forecast:'Forecast'};
  const billBadge = useMemo(()=>{
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()+7);
    return bills.filter(b=>!b.paid && new Date(b.dueDate+'T00:00:00')<=cutoff).length;
  },[bills]);

  const page = {
    dashboard: <Dashboard income={income} bills={bills} goals={goals} settings={settings} onSettings={setSettings} onNav={setTab}/>,
    income:    <IncomeView income={income} setIncome={setIncome} settings={settings} toast={toast}/>,
    bills:     <BillsView bills={bills} setBills={setBills} settings={settings} toast={toast}/>,
    calendar:  <CalendarView bills={bills} income={income} goals={goals} settings={settings}/>,
    goals:     <GoalsView goals={goals} setGoals={setGoals} settings={settings} toast={toast}/>,
    forecast:  <ForecastView income={income} bills={bills} settings={settings}/>,
  }[tab];

  return (
    <div className="min-h-screen bg-[#FFF0F7] dark:bg-forest-900 font-body transition-colors duration-300">
      <div className="max-w-lg mx-auto min-h-screen flex flex-col">
        {/* Header */}
        <header className="sticky top-0 z-30 bg-[#FFF0F7]/90 dark:bg-forest-900/90 backdrop-blur-xl px-5 pb-3 flex items-end justify-between border-b border-transparent" style={{paddingTop:'max(2rem, env(safe-area-inset-top, 2rem))'}}>
          <div>
            {tab==='dashboard' ? (
              <>
                <h1 className="font-display text-2xl text-sage-500 dark:text-sage-400 leading-tight">CalmCash</h1>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">
                  {today.toLocaleDateString('en-IE',{weekday:'long',day:'numeric',month:'long'})}
                </p>
              </>
            ) : (
              <h1 className="font-semibold text-lg text-gray-800 dark:text-gray-200">{TAB_TITLES[tab]}</h1>
            )}
          </div>
          <div className="flex items-center gap-2 mb-0.5">
            <button onClick={()=>setSettings({...settings,darkMode:!settings.darkMode})}
              className="p-2.5 rounded-2xl bg-white dark:bg-forest-800 shadow-sm hover:shadow-md transition-shadow"
              aria-label="Toggle dark mode">
              <I n={settings.darkMode?'sun':'moon'} s={17} c="text-sage-500 dark:text-sage-400"/>
            </button>
            <button onClick={()=>setShowSett(true)}
              className="p-2.5 rounded-2xl bg-white dark:bg-forest-800 shadow-sm hover:shadow-md transition-shadow"
              aria-label="Open settings">
              <I n="cog" s={17} c="text-gray-500 dark:text-gray-400"/>
            </button>
          </div>
        </header>

        {/* Page */}
        <main className="flex-1 px-4 pt-4 pb-32" key={tab}>
          {page}
        </main>

        <FAB onNav={setTab}/>
        <BottomNav active={tab} onChange={setTab} billBadge={billBadge}/>
        <SettingsModal open={showSett} close={()=>setShowSett(false)} settings={settings}
          onSettings={setSettings} onExport={exportCSV} onExportJSON={exportJSON} onImportJSON={importJSON}
          notifPerm={notifPerm} onRequestNotifs={requestNotifs}/>
        <Toast toasts={toasts}/>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
